<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Milya Meiira Commission</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Be Vietnam Pro',sans-serif;
background:#f6eeee;
color:#5b4545;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 1%;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(8px);
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-weight:700;
font-size:22px;
}

.logo img{
width:34px;
}

.menu{
display:flex;
gap:25px;
align-items:center;
margin-right:40px;
}

.menu a{
text-decoration:none;
color:#6a5050;
font-weight:600;
position:relative;
transition:0.25s;
}

.menu a:hover{
color:#d85d7b;
transform:translateY(-3px);
}

.menu a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:#d85d7b;
transition:0.25s;
}

.menu a:hover::after{
width:100%;
}

.contact-nav{
background:#e88fa2;
color:white !important;
padding:9px 22px;
border-radius:22px;
}

/* HERO */

.hero{
padding-top:120px;
text-align:center;
}

.avatar{
width:170px;
height:170px;
border-radius:50%;
border:6px solid #e8a3b0;
object-fit:cover;
cursor:pointer;
transition:.25s;
}

.avatar:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.artist-name{
margin-top:18px;
font-size:34px;
font-weight:800;
font-family:'Playfair Display',serif;
}

.artist-role{
font-size:15px;
opacity:0.7;
margin-top:5px;
}

/* TITLE */

.section-title{
display:flex;
align-items:center;
justify-content:center;
gap:14px;
font-size:38px;
font-family:'Playfair Display',serif;
margin-top:80px;
}

.section-title img{
height:38px;
}

/* GALLERY */

.gallery-box{
max-width:950px;
margin:auto;
}

.filter{
display:flex;
justify-content:center;
gap:14px;
margin:25px 0;
}

.filter button{
padding:10px 24px;
border-radius:25px;
border:2px solid #e88fa2;
background:white;
cursor:pointer;
font-weight:600;
transition:.25s;
}

.filter button.active{
background:#e88fa2;
color:white;
transform:translateY(-4px);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
}

.gallery img{
width:100%;
border-radius:12px;
cursor:pointer;
transition:.25s;
}

.gallery img:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 8px 15px rgba(0,0,0,0.15);
}

/* PRICE */

.price-wrapper{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
max-width:950px;
margin:auto;
}

.price-box{
background:#f3e2e2;
border-radius:20px;
padding:30px;
transition:.25s;
}

.price-box:hover{
transform:translateY(-8px);
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#e88fa2;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
}

tr:nth-child(even){
background:#f9eeee;
}

/* TOS */

.tos-wrapper{
max-width:950px;
margin:40px auto;
display:flex;
flex-direction:column;
gap:25px;
}

.tos-card{
background:#f3e2e2;
border-radius:20px;
padding:30px;
border:1px solid #ebcaca;
transition:.25s;
}

.tos-card:hover{
transform:translateY(-6px);
}

.tos-card h3{
color:#d85d7b;
margin-top:0;
}

/* WARNING */

.warning{
background:#e88fa2;
color:white;
padding:12px;
border-radius:12px;
margin-top:10px;
font-weight:600;
}

/* CONTACT */

.contact{
text-align:center;
margin:80px 0;
}

.contact a{
background:#e88fa2;
color:white;
padding:14px 36px;
border-radius:30px;
text-decoration:none;
font-weight:600;
transition:0.25s;
display:inline-block;
}

.contact a:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.18);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup img{
max-width:80%;
border-radius:10px;
}

/* PETAL */

.petal{
position:fixed;
top:-20px;
width:20px;
height:20px;
background:url("petal.png") no-repeat center;
background-size:contain;
animation:fall linear infinite;
z-index:-1;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0);}
100%{transform:translateY(110vh) rotate(360deg);}
}

.footer-note{
margin-top:18px;
font-size:14px;
opacity:0.75;
}

@media (max-width:768px){

}

</style>
</head>

<body>

<nav>

<div class="logo">
<img src="peach.png"> Milya Meiira
</div>

<div class="menu">
<a href="#gallery">Gallery</a>
<a href="#price">Bảng giá</a>
<a href="#tos">TOS</a>
<a href="#contact" class="contact-nav">Liên hệ</a>
</div>

</nav>

<section class="hero">

<img src="avatar.jpg" class="avatar" onclick="openImg(this.src)">

<div class="artist-name">Milya Meiira</div>
<div class="artist-role">Digital artist</div>

</section>

<h2 id="gallery" class="section-title">
<img src="peach.png">

<img src="peach.png">
</h2>

<div class="gallery-box">

<div class="filter">
<button class="active" onclick="showGallery('normal',this)">Normal</button>
<button onclick="showGallery('chibi',this)">Chibi</button>
</div>

<div class="gallery" id="gallery"></div>

</div>

<h2 id="price" class="section-title">
<img src="peach.png">
Bảng giá
<img src="peach.png">
</h2>

<div class="price-wrapper">

<div class="price-box">

<h3>Normal</h3>

<table>
<tr><th>Loại</th><th>Sketch</th><th>Color</th><th>Full</th></tr>
<tr><td>Headshot</td><td>50k</td><td>80k</td><td>100k</td></tr>
<tr><td>Chest-up</td><td>80k</td><td>100k</td><td>135k</td></tr>
<tr><td>Half-body</td><td>110k</td><td>150k</td><td>200k</td></tr>
</table>

<p><b>(Hiện tại mình không nhận full body)</b></p>

</div>

<div class="price-box">

<h3>Chibi</h3>

<table>
<tr><th>Loại</th><th>Sketch</th><th>Full</th></tr>
<tr><td>Head</td><td>40k</td><td>70k</td></tr>
<tr><td>Half</td><td>60k</td><td>100k</td></tr>
<tr><td>Full</td><td>90k</td><td>140k</td></tr>
</table>

</div>

</div>

<h2 id="tos" class="section-title">
<img src="peach.png">
Điều khoản
<img src="peach.png">
</h2>
