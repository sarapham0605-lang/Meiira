<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Milya Meiira Commission</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

html{
scroll-behavior:smooth;
}

body{

margin:0;
font-family:'Be Vietnam Pro',sans-serif;
background:#f6eeee;
color:#5b4545;
overflow-x:hidden;

}

/* NAVBAR */

nav{

position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
padding:14px 8%;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(8px);
z-index:999;

}

.contact-btn{

background:#e88fa2;
color:white;
padding:10px 24px;
border-radius:25px;
text-decoration:none;
font-weight:600;
margin-right:40px;

}

.menu{

display:flex;
gap:30px;
margin-left:auto;

}

.menu a{

text-decoration:none;
color:#6a5050;
font-weight:600;
transition:.25s;

}

.menu a:hover{

color:#d85d7b;
transform:translateY(-3px);
text-decoration:underline;

}

/* HERO */

.hero{

padding-top:120px;
text-align:center;

}

.avatar{

width:170px;
height:170px;
border-radius:50%;
border:6px solid #e8a3b0;
object-fit:cover;
transition:.3s;
cursor:pointer;

}

.avatar:hover{

transform:translateY(-10px) scale(1.05);
box-shadow:0 12px 25px rgba(0,0,0,0.15);

}

.hero h1{

font-size:44px;
margin:15px 0;

}

/* BUTTON */

.quick{

display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;

}

.btn{

padding:12px 26px;
border-radius:25px;
font-weight:600;
text-decoration:none;
transition:.25s;

}

.btn-main{

background:#e88fa2;
color:white;

}

.btn-outline{

border:2px solid #e88fa2;
color:#e88fa2;

}

.btn:hover{

transform:translateY(-4px);

}

/* TITLE */

.section-title{

display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:36px;
font-family:'Playfair Display',serif;
margin-top:90px;

}

.section-title img{
height:30px;
}

/* BOX */

.section{

background:#f3e2e2;
border-radius:20px;
padding:40px;
margin:40px auto;
max-width:950px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:.25s;

}

.section:hover{

transform:translateY(-6px);

}

/* GALLERY */

.filter{

display:flex;
justify-content:center;
gap:12px;
margin-bottom:20px;

}

.filter button{

padding:10px 24px;
border-radius:25px;
border:2px solid #e88fa2;
background:none;
cursor:pointer;

}

.filter button.active{

background:#e88fa2;
color:white;

}

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;

}

.gallery img{

width:100%;
border-radius:12px;
transition:.3s;
cursor:pointer;

}

.gallery img:hover{

transform:translateY(-8px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.15);

}

/* IMAGE POPUP */

.popup{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:2000;

}

.popup img{

max-width:80%;
max-height:80%;
border-radius:12px;

}

/* PRICE */

.price-grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:25px;

}

.price-box{

background:white;
padding:25px;
border-radius:16px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:.25s;

}

.price-box:hover{

transform:translateY(-6px);

}

.price-box h3{

margin-top:0;
color:#d85d7b;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#e88fa2;
color:white;
padding:12px;

}

td{

padding:12px;
text-align:center;

}

tr:nth-child(even){

background:#f7eeee;

}

.note{

color:#c05773;
font-weight:600;
margin-top:10px;

}

/* TOS */

.tos-wrapper{

max-width:950px;
margin:40px auto;
display:flex;
flex-direction:column;
gap:25px;

}

.tos-card{

background:#f3e2e2;
border-radius:20px;
padding:30px;
border:1px solid #ebcaca;
transition:.25s;

}

.tos-card:hover{

transform:translateY(-5px);

}

/* PETALS */

.petal{

position:fixed;
top:-40px;
width:20px;
height:20px;
background:url("petal.png") no-repeat center;
background-size:contain;
animation:fall linear infinite;
z-index:-1;

}

@keyframes fall{

0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}

}

</style>
</head>

<body>

<nav>

<a href="#contact" class="contact-btn">Liên hệ</a>

<div class="menu">

<a href="#gallery">Gallery</a>
<a href="#price">Bảng giá</a>
<a href="#tos">TOS</a>

</div>

</nav>

<section class="hero">

<img src="avatar.jpg" class="avatar" onclick="openImg(this.src)">

<h1>Milya Meiira</h1>

</section>

<h2 class="section-title">Gallery</h2>

<section id="gallery" class="section">

<div class="filter">

<button class="active" onclick="showGallery('normal',this)">Normal</button>
<button onclick="showGallery('chibi',this)">Chibi</button>

</div>

<div class="gallery" id="gallery-container"></div>

</section>

<div class="popup" id="popup" onclick="closeImg()">
<img id="popup-img">
</div>

<script>

const normal=[
"normal1.jpg",
"normal2.jpg",
"normal3.jpg",
"normal4.jpg",
"normal5.jpg",
"normal6.jpg"
]

const chibi=[
"chibi1.jpg",
"chibi2.jpg",
"chibi3.jpg",
"chibi4.jpg",
"chibi5.jpg",
"chibi6.jpg"
]

function showGallery(type,btn){

document.querySelectorAll(".filter button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

let list=type==="normal"?normal:chibi

let html=""

list.forEach(img=>{

html+=`<img src="${img}" onclick="openImg('${img}')">`

})

document.getElementById("gallery-container").innerHTML=html

}

showGallery("normal",document.querySelector(".filter button"))

function openImg(src){

document.getElementById("popup").style.display="flex"
document.getElementById("popup-img").src=src

}

function closeImg(){

document.getElementById("popup").style.display="none"

}

for(let i=0;i<40;i++){

let petal=document.createElement("div")
petal.className="petal"

petal.style.left=Math.random()*100+"vw"
petal.style.animationDuration=(6+Math.random()*8)+"s"

document.body.appendChild(petal)

}

</script>

</body>
</html>
