<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meiira Commission</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Quicksand',sans-serif;
background:linear-gradient(#fff0f3,#ffe4ea);
color:#5a3a3a;
overflow-x:hidden;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
}

.logo{
font-size:22px;
font-weight:600;
}

.menu a{
margin:0 15px;
text-decoration:none;
color:#7a5a5a;
font-weight:600;
}

.menu a:hover{
color:#ff6f91;
}

/* HERO */

.hero{
text-align:center;
padding:40px 20px;
}

.avatar{
width:200px;
height:200px;
border-radius:50%;
border:6px solid #ffc2cf;
object-fit:cover;
}

.hero h1{
font-size:55px;
margin:15px 0 5px;
}

.subtitle{
color:#a27a7a;
}

/* BUTTONS */

.buttons{
margin-top:30px;
}

.peach-btn{
background:#ff8da1;
border:none;
padding:14px 30px;
margin:10px;
border-radius:40px;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.peach-btn:hover{
transform:scale(1.1);
background:#ff6f91;
box-shadow:0 8px 18px rgba(255,105,130,0.4);
}

/* GALLERY */

.gallery{
padding:60px 10%;
text-align:center;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.gallery-grid img{
width:100%;
border-radius:15px;
transition:0.3s;
}

.gallery-grid img:hover{
transform:scale(1.05);
}

/* PRICE */

.price{
padding:60px 10%;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
}

th{
background:#ff8da1;
color:white;
padding:12px 20px;
}

td{
padding:12px 20px;
background:white;
}

tr:nth-child(even) td{
background:#ffe6eb;
}

/* SAKURA */

.sakura{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(110vh)}
}

/* MOBILE */

@media(max-width:700px){

.hero h1{
font-size:40px;
}

.avatar{
width:150px;
height:150px;
}

nav{
flex-direction:column;
gap:10px;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">🍑 Meiira</div>

<div class="menu">
<a href="#">Trang chủ</a>
<a href="#gallery">Gallery</a>
<a href="#price">Giá</a>
<a href="#about">About</a>
</div>

</nav>

<section class="hero">

<img src="avatar.jpg" class="avatar">

<h1>Meiira</h1>

<div class="subtitle">Anime & Chibi Artist</div>

<div class="buttons">

<button class="peach-btn">🍑 Xem Gallery</button>

<button class="peach-btn">🍑 Bảng Giá</button>

<button class="peach-btn">🍑 About Me</button>

<button class="peach-btn" onclick="window.open('LINK_FACEBOOK')">
🍑 Liên hệ Commission
</button>

</div>

</section>

<section class="gallery" id="gallery">

<h2>Sample Gallery</h2>

<div class="gallery-grid">

<img src="sample1.jpg">
<img src="sample2.jpg">
<img src="sample3.jpg">
<img src="sample4.jpg">

</div>

</section>

<section class="price" id="price">

<h2>Bảng Giá</h2>

<table>

<tr>
<th>Loại</th>
<th>Sketch</th>
<th>Color</th>
<th>Full</th>
</tr>

<tr>
<td>Headshot</td>
<td>50k</td>
<td>80k</td>
<td>100k</td>
</tr>

<tr>
<td>Chest-up</td>
<td>80k</td>
<td>100k</td>
<td>135k</td>
</tr>

<tr>
<td>Half-body</td>
<td>110k</td>
<td>150k</td>
<td>200k</td>
</tr>

</table>

</section>

<script>

/* sakura */

for(let i=0;i<35;i++){

let petal=document.createElement("div")

petal.className="sakura"

petal.innerHTML="🌸"

petal.style.left=Math.random()*100+"vw"

petal.style.animationDuration=5+Math.random()*6+"s"

petal.style.opacity=Math.random()

document.body.appendChild(petal)

}

</script>

</body>
</html>
