<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Milya Meiira Commission</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Be Vietnam Pro',sans-serif;
background:#f6eeee;
color:#5b4545;
overflow-x:hidden;
}

/* PETAL */

.petal{
position:fixed;
top:-50px;
width:22px;
height:22px;
background:url("petal.png") center/contain no-repeat;
pointer-events:none;
animation:fall linear infinite;
z-index:-1;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* NAVBAR */

nav{

position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(8px);
z-index:999;

}

.logo{

display:flex;
align-items:center;
gap:10px;
font-weight:700;
font-size:20px;

}

.logo img{width:28px;}

.menu{
display:flex;
gap:25px;
align-items:center;
}

.menu a{
text-decoration:none;
color:#6a5050;
font-weight:600;
}

.contact-btn{

background:#e88fa2;
color:white;
padding:10px 20px;
border-radius:25px;
margin-right:30px;

}

/* HERO */

.hero{
padding-top:120px;
text-align:center;
}

.avatar{

width:170px;
height:170px;
border-radius:50%;
border:6px solid #e8a3b0;
object-fit:cover;
transition:.3s;
cursor:pointer;

}

.avatar:hover{
transform:translateY(-8px) scale(1.05);
}

.hero h1{
font-size:44px;
margin:15px 0;
}

/* BUTTONS */

.quick{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{

padding:12px 26px;
border-radius:25px;
font-weight:600;
text-decoration:none;
transition:.25s;

}

.btn-main{
background:#e88fa2;
color:white;
}

.btn-outline{
border:2px solid #e88fa2;
color:#e88fa2;
}

.btn:hover{
transform:translateY(-4px);
}

/* TITLES */

.section-title{

display:flex;
justify-content:center;
align-items:center;
gap:10px;
font-size:36px;
font-family:'Playfair Display',serif;
margin-top:80px;

}

.section-title img{height:32px;}

/* GALLERY */

.gallery-filter{

display:flex;
justify-content:center;
gap:15px;
margin:25px 0;

}

.gallery-filter button{

padding:10px 22px;
border-radius:25px;
border:2px solid #e88fa2;
background:none;
cursor:pointer;
transition:.2s;

}

.gallery-filter button.active{

background:#e88fa2;
color:white;

}

.gallery-filter button:hover{
transform:translateY(-3px);
}

.gallery{

max-width:950px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;

}

.gallery img{

width:100%;
border-radius:12px;
cursor:pointer;
transition:.25s;

}

.gallery img:hover{

transform:translateY(-6px) scale(1.03);

}

/* PRICE */

.price-wrapper{

max-width:950px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;

}

.price-box{

background:#f3e2e2;
padding:30px;
border-radius:20px;
transition:.25s;

}

.price-box:hover{

transform:translateY(-8px);

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#e88fa2;
color:white;
padding:12px;

}

td{

padding:12px;
text-align:center;

}

tr:nth-child(even){
background:#f9eeee;
}

/* CONTACT */

.contact{
text-align:center;
margin:70px 0;
}

.contact a{

background:#e88fa2;
color:white;
padding:14px 34px;
border-radius:30px;
text-decoration:none;
font-weight:600;
transition:.25s;

}

.contact a:hover{
transform:translateY(-6px);
}

/* MODAL */

.modal{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;

}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>
</head>

<body>

<nav>

<div class="logo">
<img src="peach.png">
Milya Meiira
</div>

<div class="menu">

<a href="#gallery">Gallery</a>
<a href="#price">Bảng giá</a>
<a href="#tos">TOS</a>
<a href="#contact" class="contact-btn">Liên hệ</a>

</div>

</nav>

<section class="hero">

<img src="avatar.jpg" class="avatar" onclick="openModal(this.src)">

<h1>Milya Meiira</h1>

<div class="quick">

<a href="#gallery" class="btn btn-main">Xem Gallery</a>
<a href="#price" class="btn btn-outline">Bảng giá</a>
<a href="#tos" class="btn btn-outline">TOS</a>
<a href="#contact" class="btn btn-main">Liên hệ Commission</a>

</div>

</section>

<h2 class="section-title"><img src="peach.png"> Gallery</h2>

<div class="gallery-filter">

<button class="active" onclick="showGallery('normal',this)">Normal</button>
<button onclick="showGallery('chibi',this)">Chibi</button>

</div>

<div class="gallery" id="gallery"></div>

<h2 class="section-title"><img src="peach.png"> Bảng giá</h2>

<section class="price-wrapper">

<div class="price-box">

<h3>Normal</h3>

<table>

<tr><th>Loại</th><th>Sketch</th><th>Full</th></tr>
<tr><td>Headshot</td><td>50k</td><td>100k</td></tr>
<tr><td>Chest up</td><td>80k</td><td>135k</td></tr>
<tr><td>Half body</td><td>110k</td><td>200k</td></tr>

</table>

</div>

<div class="price-box">

<h3>Chibi</h3>

<table>

<tr><th>Loại</th><th>Sketch</th><th>Full</th></tr>
<tr><td>Head</td><td>40k</td><td>70k</td></tr>
<tr><td>Half</td><td>70k</td><td>110k</td></tr>
<tr><td>Full</td><td>100k</td><td>150k</td></tr>

</table>

</div>

</section>

<section id="contact" class="contact">

<a href="https://www.facebook.com/kemdao.peach/">Liên hệ Facebook</a>

</section>

<div class="modal" id="modal" onclick="this.style.display='none'">
<img id="modal-img">
</div>

<script>

/* PETAL */

for(let i=0;i<35;i++){

let petal=document.createElement("div")
petal.className="petal"

petal.style.left=Math.random()*100+"vw"
petal.style.animationDuration=(6+Math.random()*8)+"s"

document.body.appendChild(petal)

}

/* GALLERY */

const normal=[
"n1.jpg","n2.jpg","n3.jpg","n4.jpg","n5.jpg","n6.jpg"
]

const chibi=[
"c1.jpg","c2.jpg","c3.jpg","c4.jpg","c5.jpg","c6.jpg"
]

function showGallery(type,btn){

document.querySelectorAll(".gallery-filter button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

let data=type==="normal"?normal:chibi

let html=""

data.forEach(img=>{
html+=`<img src="${img}" onclick="openModal('${img}')">`
})

document.getElementById("gallery").innerHTML=html

}

showGallery("normal",document.querySelector(".gallery-filter button"))

/* MODAL */

function openModal(src){

document.getElementById("modal-img").src=src
document.getElementById("modal").style.display="flex"

}

</script>

</body>
</html>
