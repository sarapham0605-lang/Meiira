<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Milya Meiira Commission</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Be Vietnam Pro',sans-serif;
background:#f6eeee;
color:#5b4545;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
left:0;
right:0;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 8%;

background:white;

z-index:999;
transition:.3s;
}

nav.scrolled{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(8px);
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:700;
font-size:20px;
}

.logo img{
width:30px;
}

/* MENU */

.menu{
display:flex;
align-items:center;
gap:28px;
}

.menu a{
text-decoration:none;
color:#6d5454;
font-weight:600;
position:relative;
padding-bottom:6px;
}

/* underline */

.menu a::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:0%;
height:2px;
background:#e07a8e;
transition:.25s;
}

.menu a:hover::after{
width:100%;
}

/* CONTACT BUTTON */

.contact-btn{
background:#e88fa2;
color:white;
padding:10px 22px;
border-radius:25px;

position:relative;
top:-3px; /* nhích lên cho thẳng hàng */
}

.contact-btn::after{
display:none;
}

/* HERO */

.hero{
padding-top:120px;
text-align:center;
}

.avatar{
width:170px;
height:170px;
border-radius:50%;
border:6px solid #e8a3b0;
object-fit:cover;
}

.hero h1{
font-size:46px;
margin:15px 0 5px;
}

.subtitle{
color:#9c7575;
}

/* TITLES */

.section-title{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-family:'Playfair Display',serif;
font-size:40px;
margin-top:80px;
}

.section-title img{
height:38px;
}

/* SECTION CARD */

.section{
background:#f3e2e2;
border-radius:20px;
padding:40px;
margin:40px auto;
max-width:950px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:.3s;
}

.section:hover{
transform:translateY(-5px);
}

/* FILTER */

.filter{
display:flex;
justify-content:center;
gap:14px;
margin-bottom:25px;
}

.filter button{
padding:12px 28px;
border-radius:30px;
border:2px solid #e88fa2;
background:none;
font-weight:600;
cursor:pointer;
}

.filter button.active{
background:#e88fa2;
color:white;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
}

.gallery img{
width:100%;
border-radius:12px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#e88fa2;
color:white;
padding:14px;
}

td{
padding:14px;
text-align:center;
}

tr:nth-child(even){
background:#f9eeee;
}

/* CONTACT */

.contact{
text-align:center;
}

.contact a{
background:#e88fa2;
color:white;
padding:14px 35px;
border-radius:30px;
text-decoration:none;
font-weight:600;
}

/* FOOTER */

footer{
text-align:center;
margin:70px 0 30px;
font-size:13px;
color:#8b6e6e;
}

</style>

</head>

<body>

<nav id="navbar">

<div class="logo">
<img src="peach.png">
Milya Meiira
</div>

<div class="menu">

<a href="#home">Trang chủ</a>
<a href="#gallery">Gallery</a>
<a href="#price">Bảng giá</a>
<a href="#tos">Điều khoản</a>

<a href="#contact" class="contact-btn">Liên hệ</a>

</div>

</nav>

<section id="home" class="hero">

<img src="avatar.jpg" class="avatar">

<h1>Milya Meiira</h1>

<div class="subtitle">Digital Artist</div>

</section>

</body>
</html>
